version: '3.8'
services:
  frontend:
    build: ./frontend # Dockerfile 所在的資料夾
    ports:
      - "8501:8501" # 本機 Port : 容器內 Port
    environment:
      - GATEWAY_URL=http://gateway:8000
    depends_on:
      - gateway # 確保啟動順序

  gateway:
    build: ./gateway
    ports:
      - "8000:8000"
    environment:
      - NLP_URL=http://nlp:8001
      - STAT_URL=http://stat:8002
    depends_on:
      - nlp
      - stat

  nlp:
    build: ./nlp
    ports:
      - "8001:8001"

  stat:
    build: ./stat
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data  # 讓容器讀取到外部的資料庫檔案